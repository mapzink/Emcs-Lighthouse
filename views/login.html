<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>The Lighthouse — Login</title>
  <link rel="icon" type="image/x-icon" href="/images/lighthouse-logo.png">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="/css/emoji.css">
  <style>
    :root {
      --accent: #ff4b2b;
      --bg-gradient: radial-gradient(circle at top, #0a0e27 0%, #020411 100%);
      --text: #f0f3ff;
      --muted: #9ba1c2;
      --radius: 18px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Noto Serif', 'Apple Color Emoji Web', 'Apple Color Emoji', 'Segoe UI Emoji', 'Noto Color Emoji', serif;
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      /* Use a full-viewport background image and a subtle dark overlay
         so it scales to fill without showing bars at top/bottom. */
      background-image: linear-gradient(rgba(10,14,39,0.55), rgba(10,14,39,0.55)), url('/images/login-background.jpg');
      background-size: cover;
      background-position: center center;
      background-repeat: no-repeat;
      background-attachment: fixed;
    }

    /* ---------------- HEADER ---------------- */
    header {
      width: 100%;
      padding: 24px 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(10, 14, 39, 0.5);
      backdrop-filter: blur(10px);
      position: fixed;
      top: 0;
      z-index: 1000;
    }

    header img {
      height: 80px;
      width: auto;
      object-fit: cover;
      border-radius: var(--radius);
      cursor: pointer;
    }

    nav a {
      text-decoration: none;
      color: var(--text);
      font-weight: 600;
      font-size: 1.05rem;
      margin: 0 20px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      transition: 0.3s ease;
    }

    nav a:hover { color: var(--accent); text-shadow: 0 0 8px var(--accent); }

    /* ---------------- LOGIN SECTION ---------------- */
    .hero {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100%;
      padding-top: 100px;
      position: relative;
    }

    .stars {
      position: absolute;
      top: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
    }

    .star {
      position: absolute;
      width: 2px;
      height: 2px;
      background: white;
      border-radius: 50%;
      animation: twinkle 4s infinite ease-in-out;
    }

    @keyframes twinkle {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 1; }
    }

    .login-wrapper {
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100%;
      max-width: 400px;
      padding: 20px;
      z-index: 10;
    }

    .login-box {
      background-color: rgba(20, 25, 40, 0.9);
      padding: clamp(20px, 4vw, 40px);
      border-radius: var(--radius);
      box-shadow: 0 10px 25px rgba(0,0,0,0.5);
      text-align: center;
      width: clamp(200px, 80%, 400px);
      transition: all 0.3s ease;
    }

    .login-box h2 {
      margin-bottom: 25px;
      color: var(--accent);
      font-size: clamp(1.5rem, 4vw, 2rem);
    }

    .login-box input {
      width: 100%;
      padding: clamp(10px, 2vw, 12px);
      margin: 10px 0;
      border: 1px solid #444;
      border-radius: 8px;
      background-color: #0a0e27;
      color: #fff;
      font-size: clamp(0.9rem, 2.5vw, 1rem);
      outline: none;
      transition: 0.3s;
    }

    .login-box input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 8px rgba(255,75,43,0.4);
    }

    .login-box button {
      width: 100%;
      padding: clamp(10px, 2.5vw, 12px);
      margin-top: 15px;
      background: linear-gradient(135deg, #ff4b2b, #ff416c);
      border: none;
      border-radius: 8px;
      color: white;
      font-weight: bold;
      font-size: clamp(0.9rem, 2.5vw, 1rem);
      cursor: pointer;
      transition: 0.3s;
    }

    .login-box button:hover {
      background: linear-gradient(135deg, #ff416c, #ff4b2b);
    }

    .error-message { color: red; margin-top: 10px; font-size: 0.9em; }

    /* ---------------- FOOTER ---------------- */
    footer {
      padding: 40px 20px;
      text-align: center;
      color: var(--muted);
      background: rgba(10, 14, 39, 0.6);
      /* Match header blur for a frosted glass effect */
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      margin-top: auto;
    }

    footer a {
      color: var(--accent);
      text-decoration: none;
    }

    footer a:hover {
      text-shadow: 0 0 8px var(--accent);
      transition: 0.3s ease;
    }
  </style>
</head>
<body>
  <!-- Header -->
  <header>
    <img src="/images/lighthouse-logo.png" alt="The Lighthouse Logo" onclick="window.location.href='/'">
    <nav>
      <a href="#"><i class="fa-solid fa-file-lines"></i> Articles</a>
      <a href="#"><i class="fa-solid fa-newspaper"></i> Blog</a>
      <a href="#"><i class="fa-solid fa-podcast"></i> Podcasts</a>
      <a href="#"><i class="fa-solid fa-circle-question"></i> Help</a>
      <a href="/login" id="login-link"><i class="fa-solid fa-right-to-bracket"></i> Login</a>
    </nav>
  </header>

  <!-- Login Section -->
  <section class="hero">
    <div class="stars" id="stars"></div>
    <div class="login-wrapper">
      <div class="login-box">
        <h2>Login</h2>
        <form id="loginForm">
          <input type="text" id="username" name="username" placeholder="Username" autocomplete="off" required>
          <input type="password" id="password" name="password" placeholder="Password" autocomplete="off" required>
          <button type="submit">Login</button>
        </form>
        <p id="error" class="error-message"></p>
      </div>
    </div>
  </section>

  <!-- Footer -->
  <footer>
    <p><a href="/contact">Contact</a> | <a href="https://emmanuelcs.ca/" target="_blank">EMCS Website</a></p>
    <p>© <span id="year"></span> The Lighthouse — Built by students, for students.</p>
  </footer>

<script>
document.getElementById("year").textContent = new Date().getFullYear();

// Handle login form submission
document.getElementById("loginForm").addEventListener("submit", async (e) => {
  e.preventDefault();

  const username = document.getElementById("username").value.trim();
  const password = document.getElementById("password").value.trim();
  const errorEl = document.getElementById("error");
  errorEl.textContent = "";

  try {
    const res = await fetch("/auth/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      credentials: 'include',
      body: JSON.stringify({ username, password })
    });

    const data = await res.json();

    if (res.ok) {
      // Server sets an HttpOnly cookie; store minimal user info for UI and redirect
      localStorage.setItem("user", JSON.stringify(data.user));
      window.location.href = "/dashboard";
    } else {
      errorEl.textContent = data.error || "Invalid username or password.";
    }
  } catch (err) {
    console.error("Login error:", err);
    errorEl.textContent = "Server error. Please try again later.";
  }
});
</script>
</body>
</html>
